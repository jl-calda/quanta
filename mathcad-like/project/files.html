<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--surface-paper); color: var(--text-primary); font-family: var(--font-sans); }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  .scroll-y { overflow-y: auto; scrollbar-width: thin; }
  .scroll-y::-webkit-scrollbar { width: 10px; }
  .scroll-y::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; border: 3px solid transparent; background-clip: padding-box; }

  .q-grid-mini { background-image: radial-gradient(var(--grid-dot) 1px, transparent 1px); background-size: 11px 11px; background-position: -1px -1px; }
  .q-link { color: var(--text-link); text-decoration: none; cursor: pointer; }
  .q-link:hover { text-decoration: underline; }

  .fb-row { transition: background var(--dur-fast) var(--ease-out); }
  .fb-row:hover { background: var(--surface-hover); }
  .fb-row .row-kebab { opacity: 0; transition: opacity var(--dur-fast) var(--ease-out); }
  .fb-row:hover .row-kebab, .fb-row.is-sel .row-kebab { opacity: 1; }
  .fb-row .row-check { opacity: 0; transition: opacity var(--dur-fast) var(--ease-out); }
  .fb-row:hover .row-check, .fb-row.is-sel .row-check, .fb-row.any-sel .row-check { opacity: 1; }

  .fb-grid-card { transition: box-shadow var(--dur-base) var(--ease-out), border-color var(--dur-base) var(--ease-out); }
  .fb-grid-card:hover { box-shadow: var(--shadow-sm); border-color: var(--border-strong); }
  .fb-grid-card .card-check { opacity: 0; transition: opacity var(--dur-fast) var(--ease-out); }
  .fb-grid-card:hover .card-check, .fb-grid-card.is-sel .card-check { opacity: 1; }

  @keyframes pop-in { from { opacity: 0; transform: translateY(6px) scale(0.99); } to { opacity: 1; transform: none; } }
  .pop-in { animation: pop-in var(--dur-base) var(--ease-out); }
  @keyframes bar-in { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
  .bar-in { animation: bar-in var(--dur-base) var(--ease-out); }

  :focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { .pop-in, .bar-in { animation: none; } }
</style>
