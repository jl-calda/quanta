<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--surface-paper); color: var(--text-primary); font-family: var(--font-sans); }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  .scroll-y { overflow-y: auto; scrollbar-width: thin; }
  .scroll-y::-webkit-scrollbar { width: 10px; }
  .scroll-y::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; border: 3px solid transparent; background-clip: padding-box; }

  .q-grid-mini { background-image: radial-gradient(var(--grid-dot) 1px, transparent 1px); background-size: 12px 12px; background-position: -1px -1px; }
  .q-link { color: var(--text-link); text-decoration: none; cursor: pointer; }
  .q-link:hover { text-decoration: underline; }

  .ref-row { transition: background var(--dur-fast) var(--ease-out); }
  .ref-row:hover { background: var(--surface-hover); }

  mark.hl { background: color-mix(in srgb, var(--status-warning) 32%, transparent); color: inherit; border-radius: 2px; padding: 0 1px; }

  @keyframes fade-rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .fade-rise { animation: fade-rise var(--dur-base) var(--ease-out); }

  :focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { .fade-rise { animation: none; } }
</style>
