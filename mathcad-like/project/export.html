<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--surface-chrome); color: var(--text-primary); font-family: var(--font-sans); }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  .scroll-y { overflow-y: auto; scrollbar-width: thin; }
  .scroll-y::-webkit-scrollbar { width: 11px; }
  .scroll-y::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; border: 3px solid transparent; background-clip: padding-box; }

  .q-link { color: var(--text-link); text-decoration: none; cursor: pointer; font: inherit; border: none; background: none; padding: 0; }
  .q-link:hover { text-decoration: underline; }

  .ex-page { background: #fff; box-shadow: 0 1px 3px rgba(20,24,29,0.12), 0 6px 18px rgba(20,24,29,0.10); position: relative; }
  .ex-input { width: 100%; height: 30px; padding: 0 9px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface-raised); font: 12.5px/1 var(--font-sans); color: var(--text-primary); outline: none; }
  .ex-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 26%, transparent); }

  :focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
</style>
