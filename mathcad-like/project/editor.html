<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--surface-chrome); color: var(--text-primary); font-family: var(--font-sans); }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  .scroll-y { overflow-y: auto; scrollbar-width: thin; }
  .scroll-y::-webkit-scrollbar { width: 11px; }
  .scroll-y::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; border: 3px solid var(--canvas-field); }
  .scroll-x { overflow-x: auto; scrollbar-width: thin; }

  :root { --canvas-field: #E7EAEF; }

  /* ---- canvas page ---- */
  .ed-field { background: var(--canvas-field); }
  .ed-page {
    width: 816px; margin: 0 auto; background: var(--surface-paper);
    border: 1px solid var(--border-strong); box-shadow: var(--shadow-sm);
  }
  .ed-page-body { padding: 26px 52px 40px; position: relative; }

  /* ---- region chrome ---- */
  .region { position: relative; border-radius: var(--radius-sm); border: 1px solid transparent; transition: background var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out); }
  .region:hover { background: color-mix(in srgb, var(--accent-tint) 45%, transparent); }
  .region.is-selected { background: var(--surface-selected); border-color: var(--accent); }
  .region.is-editing { background: var(--surface-paper); border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent); }
  .region.is-error:hover { background: color-mix(in srgb, var(--status-error-bg) 55%, transparent); }
  @keyframes edCaret { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  .edit-caret { animation: edCaret 1.05s steps(1) infinite; }
  @media (prefers-reduced-motion: reduce) { .edit-caret { animation: none; } }

  .region .reorder, .region .region-tools, .region .insert-below, .region .col-split { opacity: 0; transition: opacity var(--dur-fast) var(--ease-out); }
  .region:hover .reorder, .region:hover .region-tools, .region:hover .insert-below, .region:hover .col-split,
  .region.is-selected .reorder, .region.is-selected .region-tools,
  .region.demo-hover .reorder, .region.demo-hover .region-tools, .region.demo-hover .insert-below, .region.demo-hover .col-split { opacity: 1; }

  .indent-guide { position: absolute; left: -15px; top: 4px; bottom: 4px; border-left: 1px dashed var(--accent); opacity: 0.5; }

  .ed-tab { position: relative; background: none; border: none; cursor: pointer; }
  .ed-tab.on::after { content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: var(--accent); }

  .kp-key { display: inline-flex; align-items: center; justify-content: center; height: 30px; border: 1px solid var(--border-hairline); background: var(--surface-raised); border-radius: var(--radius-sm); cursor: pointer; color: var(--text-primary); font-family: var(--font-math); font-size: 15px; transition: background var(--dur-fast) var(--ease-out); }
  .kp-key:hover { background: var(--surface-hover); border-color: var(--border-strong); }

  input.bare { border: none; background: transparent; outline: none; color: inherit; font: inherit; }
  :focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 1px; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
