<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--surface-paper); color: var(--text-primary); font-family: var(--font-sans); }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  .scroll-y { overflow-y: auto; scrollbar-width: thin; }
  .scroll-y::-webkit-scrollbar { width: 10px; }
  .scroll-y::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; border: 3px solid transparent; background-clip: padding-box; }

  .q-link { color: var(--text-link); text-decoration: none; cursor: pointer; font: inherit; border: none; background: none; padding: 0; }
  .q-link:hover { text-decoration: underline; }

  .sh-row { transition: background var(--dur-fast) var(--ease-out); }
  .sh-row:hover { background: var(--surface-hover); }
  .sh-row .row-kebab, .sh-row .row-manage { opacity: 0; transition: opacity var(--dur-fast) var(--ease-out); }
  .sh-row:hover .row-kebab, .sh-row:hover .row-manage { opacity: 1; }

  @keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes dialog-in { from { opacity: 0; transform: translateY(8px) scale(0.99); } to { opacity: 1; transform: none; } }
  .overlay-in { animation: overlay-in var(--dur-base) var(--ease-out); }
  .dialog-in { animation: dialog-in var(--dur-base) var(--ease-out); }

  :focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { .overlay-in, .dialog-in { animation: none; } }
</style>
