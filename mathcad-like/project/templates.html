<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--surface-paper); color: var(--text-primary); font-family: var(--font-sans); }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  .scroll-y { overflow-y: auto; scrollbar-width: thin; }
  .scroll-y::-webkit-scrollbar { width: 10px; }
  .scroll-y::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; border: 3px solid transparent; background-clip: padding-box; }
  .scroll-x { overflow-x: auto; scrollbar-width: none; }
  .scroll-x::-webkit-scrollbar { display: none; }

  .q-grid-mini { background-image: radial-gradient(var(--grid-dot) 1px, transparent 1px); background-size: 11px 11px; background-position: -1px -1px; }

  .q-link { color: var(--text-link); text-decoration: none; cursor: pointer; }
  .q-link:hover { text-decoration: underline; }

  .tpl-card { transition: box-shadow var(--dur-base) var(--ease-out), border-color var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out); }
  .tpl-card:hover { box-shadow: var(--shadow-sm); border-color: var(--border-strong); }
  .tpl-card .hover-actions { opacity: 0; transform: translateY(4px); transition: opacity var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out); }
  .tpl-card:hover .hover-actions { opacity: 1; transform: translateY(0); }
  .tpl-card .thumb-scrim { opacity: 0; transition: opacity var(--dur-base) var(--ease-out); }
  .tpl-card:hover .thumb-scrim { opacity: 1; }

  @keyframes drawer-in { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }
  .drawer { animation: drawer-in var(--dur-base) var(--ease-out); }
  .overlay { animation: overlay-in var(--dur-base) var(--ease-out); }

  :focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { .drawer, .overlay { animation: none; } }
</style>
