<style>
  html, body { margin: 0; min-height: 100%; }
  body { background: var(--surface-chrome); color: var(--text-primary); font-family: var(--font-sans); }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  .scroll-x { overflow-x: auto; scrollbar-width: thin; }
  .scroll-x::-webkit-scrollbar { height: 7px; }
  .scroll-x::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }

  .rb-tab { position: relative; background: none; border: none; cursor: pointer; }
  .rb-tab.on::after { content: ''; position: absolute; left: 8px; right: 8px; bottom: -1px; height: 2px; background: var(--accent); border-radius: 2px 2px 0 0; }

  .tt { position: relative; }
  .tt::after { content: attr(data-tt); position: absolute; bottom: calc(100% + 7px); left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--text-inverse); font: 500 11px/1 var(--font-sans); padding: 5px 8px; border-radius: 5px; white-space: nowrap; box-shadow: var(--shadow-popover); opacity: 0; pointer-events: none; transition: opacity var(--dur-fast) var(--ease-out); z-index: 30; }
  .tt:hover::after { opacity: 1; }

  :focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 1px; }
</style>
</head>
